<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Law Web App</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #f5f6f8;
        color: #1f2937;
      }
      .container {
        max-width: 860px;
        margin: 40px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .full {
        grid-column: 1 / -1;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input[type="text"],
      select,
      input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .checks {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 8px;
      }
      .checks label {
        font-weight: 500;
      }
      button {
        margin-top: 20px;
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
      .status {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        background: #eff6ff;
      }
      .result {
        margin-top: 16px;
        background: #ecfdf5;
        padding: 14px;
        border-radius: 8px;
      }
      .error {
        margin-top: 16px;
        background: #fef2f2;
        color: #991b1b;
        padding: 14px;
        border-radius: 8px;
      }
      a {
        color: #1d4ed8;
      }
      .auth-box {
        margin-bottom: 20px;
        padding: 14px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
      }
      .auth-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .auth-actions button {
        margin-top: 0;
        padding: 8px 12px;
      }
      .btn-secondary {
        background: #374151;
      }
      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .top-row button {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="authScreen">
        <h1>AI-Law Web App</h1>
        <p>Đăng nhập hoặc đăng ký để sử dụng dịch vụ phân tích luật.</p>

        <div class="auth-box">
          <label for="auth_email">Email</label>
          <input id="auth_email" type="text" placeholder="your@email.com" />
          <label for="auth_password" style="margin-top: 8px">Mật khẩu</label>
          <input id="auth_password" type="password" placeholder="Mật khẩu" />
          <div class="auth-actions">
            <button id="registerBtn" type="button" class="btn-secondary">Đăng ký</button>
            <button id="loginBtn" type="button">Đăng nhập</button>
          </div>
          <div id="authStatus" style="margin-top: 10px; font-size: 14px; color: #111827"></div>
        </div>
      </div>

      <div id="serviceScreen" style="display: none">
        <div class="top-row">
          <div>
            <h1 style="margin: 0">AI-Law Service</h1>
            <p id="serviceUser" style="margin: 6px 0 0 0"></p>
          </div>
          <button id="logoutBtn" type="button" class="btn-secondary">Đăng xuất</button>
        </div>
        <p>Upload file luật .docx, chọn chế độ xử lý và định dạng xuất dữ liệu.</p>

        <form id="processForm">
          <div class="grid">
            <div class="full">
              <label for="input_file">File .docx</label>
              <input id="input_file" name="input_file" type="file" accept=".docx" required />
            </div>

            <div class="full">
              <label>Xuất dữ liệu</label>
              <div class="checks">
                <label><input type="checkbox" id="output_json" name="output_json" checked /> JSON</label>
                <label><input type="checkbox" id="output_sheets" name="output_sheets" /> Google Sheets</label>
              </div>
            </div>

            <div>
              <label for="mode">Chế độ xử lý</label>
              <select id="mode" name="mode">
                <option value="tool">Tool (tách ý thông thường)</option>
                <option value="tool_ai">Tool + AI (tối ưu + phân loại)</option>
              </select>
            </div>

            <div>
              <label for="gemini_api_key">Gemini API Key (tuỳ chọn)</label>
              <input id="gemini_api_key" name="gemini_api_key" type="text" placeholder="Để trống để dùng .env" />
            </div>

            <div>
              <label for="sheets_id">Google Sheets ID</label>
              <input id="sheets_id" name="sheets_id" type="text" placeholder="Bắt buộc nếu chọn xuất Sheets" />
            </div>

            <div>
              <label for="sheet_name">Tên Worksheet (tuỳ chọn)</label>
              <input id="sheet_name" name="sheet_name" type="text" placeholder="VD: Luat 69/2025" />
            </div>

            <div>
              <label for="credentials_path">Credentials Path</label>
              <input id="credentials_path" name="credentials_path" type="text" value="credentials/credentials.json" />
            </div>

            <div>
              <label>&nbsp;</label>
              <label><input type="checkbox" id="no_clear" name="no_clear" /> Không xoá dữ liệu cũ trên Sheet</label>
            </div>
          </div>

          <button id="submitBtn" type="submit">Bắt đầu xử lý</button>
        </form>
      </div>

      <div id="status" class="status" style="display: none"></div>
      <div id="result" class="result" style="display: none"></div>
      <div id="error" class="error" style="display: none"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <script>
      const form = document.getElementById("processForm");
      const statusBox = document.getElementById("status");
      const resultBox = document.getElementById("result");
      const errorBox = document.getElementById("error");
      const submitBtn = document.getElementById("submitBtn");
      const authStatusBox = document.getElementById("authStatus");
      const registerBtn = document.getElementById("registerBtn");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const authScreen = document.getElementById("authScreen");
      const serviceScreen = document.getElementById("serviceScreen");
      const serviceUser = document.getElementById("serviceUser");
      const authEmailInput = document.getElementById("auth_email");
      const authPasswordInput = document.getElementById("auth_password");

      let pollTimer = null;
      let authToken = "";
      let firebaseReady = false;

      function showStatus(message) {
        statusBox.style.display = "block";
        statusBox.textContent = message;
      }

      function showError(message) {
        errorBox.style.display = "block";
        errorBox.textContent = message;
      }

      function resetMessages() {
        statusBox.style.display = "none";
        resultBox.style.display = "none";
        errorBox.style.display = "none";
        resultBox.innerHTML = "";
      }

      function updateAuthStatus(message) {
        authStatusBox.textContent = message;
      }

      function showAuthScreen() {
        authScreen.style.display = "block";
        serviceScreen.style.display = "none";
        submitBtn.disabled = true;
      }

      function showServiceScreen(user) {
        authScreen.style.display = "none";
        serviceScreen.style.display = "block";
        submitBtn.disabled = false;
        serviceUser.textContent = `Đăng nhập: ${user?.email || user?.uid || "Unknown"}`;
      }

      function setFormEnabledByAuthState() {
        submitBtn.disabled = !authToken;
      }

      async function forceLogoutToAuth(reason) {
        try {
          if (firebaseReady && firebase.auth().currentUser) {
            await firebase.auth().signOut();
          }
        } catch (_) {}

        authToken = "";
        showAuthScreen();
        setFormEnabledByAuthState();
        if (reason) {
          showError(reason);
        }
      }

      async function authFetch(url, options = {}) {
        if (!authToken) {
          throw new Error("Bạn cần đăng nhập trước khi sử dụng API");
        }

        const headers = new Headers(options.headers || {});
        headers.set("Authorization", `Bearer ${authToken}`);

        let response = await fetch(url, { ...options, headers });

        if (response.status === 401 || response.status === 403) {
          try {
            const user = firebase.auth().currentUser;
            if (user) {
              authToken = await user.getIdToken(true);
              headers.set("Authorization", `Bearer ${authToken}`);
              response = await fetch(url, { ...options, headers });
            }
          } catch (_) {}
        }

        if (response.status === 401 || response.status === 403) {
          await forceLogoutToAuth("Phiên đăng nhập đã hết hạn hoặc không hợp lệ. Vui lòng đăng nhập lại.");
        }

        return response;
      }

      async function initFirebaseAuth() {
        try {
          const res = await fetch("/api/firebase-config");
          const config = await res.json();
          if (!res.ok) {
            throw new Error(config.detail || "Không lấy được Firebase config");
          }

          firebase.initializeApp(config);
          firebaseReady = true;

          firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
              authToken = await user.getIdToken(true);
              updateAuthStatus(`Đã đăng nhập: ${user.email || user.uid}`);
              showServiceScreen(user);
            } else {
              authToken = "";
              updateAuthStatus("Chưa đăng nhập");
              showAuthScreen();
            }
            setFormEnabledByAuthState();
          });
        } catch (err) {
          updateAuthStatus(`Lỗi Firebase config: ${err.message}`);
          showAuthScreen();
          setFormEnabledByAuthState();
        }
      }

      registerBtn.addEventListener("click", async () => {
        if (!firebaseReady) {
          showError("Firebase chưa sẵn sàng");
          return;
        }

        const email = authEmailInput.value.trim();
        const password = authPasswordInput.value;
        try {
          await firebase.auth().createUserWithEmailAndPassword(email, password);
          updateAuthStatus("Đăng ký thành công");
        } catch (err) {
          showError(err.message || "Đăng ký thất bại");
        }
      });

      loginBtn.addEventListener("click", async () => {
        if (!firebaseReady) {
          showError("Firebase chưa sẵn sàng");
          return;
        }

        const email = authEmailInput.value.trim();
        const password = authPasswordInput.value;
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
          updateAuthStatus("Đăng nhập thành công");
        } catch (err) {
          showError(err.message || "Đăng nhập thất bại");
        }
      });

      logoutBtn.addEventListener("click", async () => {
        await forceLogoutToAuth("");
      });

      async function pollStatus(jobId) {
        pollTimer = setInterval(async () => {
          try {
            const res = await authFetch(`/api/status/${jobId}`);
            if (!res.ok) throw new Error("Không lấy được trạng thái job");
            const job = await res.json();

            showStatus(`Trạng thái: ${job.status} - ${job.message}`);

            if (job.status === "done") {
              clearInterval(pollTimer);
              submitBtn.disabled = false;

              const summary = job.result?.summary || {};
              const files = job.result?.files || {};
              const sheets = job.result?.sheets || {};

              const links = [];
              if (files.flat) {
                links.push(`<li><button type="button" onclick="downloadWithAuth('${jobId}','flat')">Tải JSON Flat</button></li>`);
              }
              if (files.nested) {
                links.push(`<li><button type="button" onclick="downloadWithAuth('${jobId}','nested')">Tải JSON Nested</button></li>`);
              }
              if (sheets.url) {
                links.push(`<li><a href="${sheets.url}" target="_blank">Mở Google Sheets</a></li>`);
              }

              resultBox.style.display = "block";
              resultBox.innerHTML = `
                <strong>Hoàn thành</strong><br/>
                Tổng dòng: ${summary.total_entries || 0} | Chương: ${summary.chapters || 0} | Mục: ${summary.sections || 0} | Điều: ${summary.articles || 0}<br/>
                Khoản: ${summary.clauses || 0} | Điểm: ${summary.points || 0} | AI: ${summary.ai_classified || 0}<br/>
                <ul>${links.join("")}</ul>
              `;
            }

            if (job.status === "error") {
              clearInterval(pollTimer);
              submitBtn.disabled = false;
              showError(job.error?.message || "Có lỗi xảy ra");
            }
          } catch (err) {
            clearInterval(pollTimer);
            submitBtn.disabled = false;
            showError(err.message || "Lỗi không xác định");
          }
        }, 2000);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        resetMessages();

        if (!authToken) {
          showError("Bạn cần đăng nhập trước khi xử lý file");
          return;
        }

        const outputJson = document.getElementById("output_json").checked;
        const outputSheets = document.getElementById("output_sheets").checked;

        if (!outputJson && !outputSheets) {
          showError("Bạn cần chọn ít nhất một kiểu xuất dữ liệu");
          return;
        }

        const formData = new FormData();
        const fileInput = document.getElementById("input_file");

        if (!fileInput.files.length) {
          showError("Bạn cần chọn file .docx");
          return;
        }

        formData.append("input_file", fileInput.files[0]);
        formData.append("output_json", outputJson);
        formData.append("output_sheets", outputSheets);
        formData.append("mode", document.getElementById("mode").value);
        formData.append("sheets_id", document.getElementById("sheets_id").value);
        formData.append("sheet_name", document.getElementById("sheet_name").value);
        formData.append("credentials_path", document.getElementById("credentials_path").value);
        formData.append("no_clear", document.getElementById("no_clear").checked);
        formData.append("gemini_api_key", document.getElementById("gemini_api_key").value);

        try {
          submitBtn.disabled = true;
          showStatus("Đang tạo job...");
          const res = await authFetch("/api/process", {
            method: "POST",
            body: formData,
          });

          const payload = await res.json();
          if (!res.ok) throw new Error(payload.detail || "Không tạo được job");

          showStatus(`Đã tạo job: ${payload.job_id}`);
          await pollStatus(payload.job_id);
        } catch (err) {
          submitBtn.disabled = false;
          showError(err.message || "Lỗi không xác định");
        }
      });

      async function downloadWithAuth(jobId, outputType) {
        try {
          const res = await authFetch(`/api/download/${jobId}/${outputType}`);
          if (!res.ok) {
            const payload = await res.json().catch(() => ({}));
            throw new Error(payload.detail || "Tải file thất bại");
          }

          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${outputType}_${jobId}.json`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          showError(err.message || "Lỗi khi tải file");
        }
      }

      window.downloadWithAuth = downloadWithAuth;

      showAuthScreen();
      initFirebaseAuth();
    </script>
  </body>
</html>
